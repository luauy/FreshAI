name: FreshAI Ship Sequence

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🚀 Push to FreshAI Repository
        uses: nkoppel/push-files-to-another-repository@v1.1.4
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          # Use '.' to say "everything in the current root"
          source-files: '.' 
          destination-username: 'luauy'
          destination-repository: 'FreshAI'
          # Where it lands in the destination
          destination-directory: 'src' 
          destination-branch: 'main'
          commit-email: 'terencecawleynew@gmail.com'
          commit-username: 'luauy'
          commit-message: '🍃 FreshAI: Direct ship from root to src/'
