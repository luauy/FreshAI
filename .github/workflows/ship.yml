name: FreshAI Self-Ship Sequence

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # This is the "Pure Air" fix for the 403 error

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🏗️ Prepare Files
        run: |
          mkdir -p src
          # This moves everything except the git folders into src
          # so your repo stays organized.
          rsync -av --exclude='.git/' --exclude='.github/' --exclude='src/' ./ src/
          echo "Files moved to src directory."

      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "luauy"
          git config --global user.email "terencecawleynew@gmail.com"
          git add src/
          git commit -m "🍃 FreshAI: Automated internal sync to src/" || echo "No changes to commit"
          git push
