<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <title>FreshAI | Serverless Code Agent for Striving Devs</title>
    <meta name="title" content="FreshAI | Serverless Code Agent">
    <meta name="description" content="A 100% serverless AI agent that optimizes code and ships directly to GitHub via OAuth. Pure Air architecture for modern developers.">

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fresh-ai.onrender.com/" />
    <meta property="og:title" content="FreshAI — Optimize & Ship" />
    <meta property="og:description" content="Connect your GitHub and let AI assist your workflow with zero backend overhead." />
    <meta property="og:image" content="/og-preview.png" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="FreshAI" />
    <meta property="twitter:description" content="Ship AI-optimized code directly to your repos." />

    <style>
      :root {
        --bg: #0a0a0a;
        --accent: #00ff88;
        --text: #ffffff;
      }
      body {
        margin: 0;
        background-color: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      #root:empty::before {
        content: "🍃 FreshAI is inflating...";
        font-size: 0.9rem;
        letter-spacing: 1px;
        opacity: 0.6;
        animation: pulse 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { opacity: 0.3; }
        50% { opacity: 0.7; }
        100% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/App.jsx"></script>
  </body>
</html>
